name: authentik

services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_USER: ${PG_USER:-authentik}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - database:/var/lib/postgresql/data
    networks:
      - authentik_internal

  redis:
    image: docker.io/library/redis:alpine
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      timeout: 3s
      retries: 5
    volumes:
      - redis:/data
    networks:
      - authentik_internal

  server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.12.4}
    container_name: authentik-server   # stable name so forward_auth clients can target it
    command: server
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    # No host ports: Caddy reaches the server over the shared `caddy` network.
    labels:
      caddy: ${AUTHENTIK_DOMAIN:?authentik domain required}
      caddy.reverse_proxy: "{{upstreams 9000}}"
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      start_period: 60s
      interval: 30s
      timeout: 30s
      retries: 3
    volumes:
      - media:/media
      - ./custom-templates:/templates
    networks:
      - caddy               # ingress only (shared with Caddy)
      - authentik_internal  # private to postgres/redis/worker

  worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.12.4}
    command: worker
    user: root
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      start_period: 60s
      interval: 30s
      timeout: 30s
      retries: 3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - media:/media
      - ./certs:/certs
      - ./custom-templates:/templates
    networks:
      - authentik_internal

networks:
  # Shared ingress network created by the caddy-docker-proxy stack.
  caddy:
    name: ${CADDY_INGRESS_NETWORK:-caddy}
    external: true
  # Private to this stack; other apps on different networks cannot reach
  # postgres or the worker. NOT marked `internal: true` because the worker
  # needs outbound internet (email, GeoIP, outpost data).
  authentik_internal:

volumes:
  database:
    driver: local
  redis:
    driver: local
  media:
    driver: local