- Backups:
    - restic → Google Drive:
        icon: mdi-cloud-upload-outline
        href: https://backup.usmanasad.ca
        description: Click to watch the live backup console
        widget:
          type: customapi
          url: http://homepage-status/backup-status.json
          refreshInterval: 30000
          display: list
          mappings:
            - field:
                running: app
              label: Running now
            - field:
                apps:
                  nextcloud: status
              label: Nextcloud
            - field:
                apps:
                  authentik: status
              label: Authentik
            - field:
                apps:
                  suwayomi: status
              label: Suwayomi
            - field:
                apps:
                  komodo: status
              label: Komodo

- Services:
    - Hive (Komodo):
