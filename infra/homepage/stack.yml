name: homepage

# Homepage (https://gethomepage.dev) — the central dashboard/hub linking every
# service, with a live restic-backup tile. Exposed at ${HOMEPAGE_DOMAIN} behind
# Authentik forward auth via caddy-docker-proxy.
#
#   homepage         — the dashboard (config mounted from ./config)
#   homepage-status  — tiny nginx serving backup-status.json so Homepage's customapi
#                      widget can fetch it (server-side, over the internal network)

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:${HOMEPAGE_TAG:-latest}
    container_name: homepage
    restart: unless-stopped
    environment:
      # Required by Homepage's host check (the public hostname Caddy forwards).
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_DOMAIN:?homepage domain required}
    volumes:
      - ./config:/app/config
    labels:
      caddy: ${HOMEPAGE_DOMAIN:?homepage domain required}
      caddy.1_reverse_proxy: "/outpost.goauthentik.io/* http://authentik-server:9000"
      caddy.2_forward_auth: "http://authentik-server:9000"
      caddy.2_forward_auth.uri: "/outpost.goauthentik.io/auth/caddy"
      caddy.2_forward_auth.copy_headers: "X-Authentik-Username X-Authentik-Groups X-Authentik-Email X-Authentik-Name X-Authentik-Uid"
      caddy.3_reverse_proxy: "{{upstreams 3000}}"
    networks:
      - caddy
      - homepage-internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  homepage-status:
    image: nginx:alpine
    container_name: homepage-status
    restart: unless-stopped
    # The backup status JSON (written by deployments/bin/backup.sh) served read-only
    # so Homepage's customapi can poll it at http://homepage-status/backup-status.json
    volumes:
      - ${BACKUP_STATUS_FILE:-/home/alien/lab/deployments/backup-status.json}:/usr/share/nginx/html/backup-status.json:ro
    networks:
      - homepage-internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  caddy:
    name: ${CADDY_INGRESS_NETWORK:-caddy}
    external: true
  homepage-internal:
    name: homepage-internal
