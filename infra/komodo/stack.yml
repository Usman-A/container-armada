name: komodo

# Komodo — container & stack management across multiple hosts.
# https://komo.do
#
# Components:
#   komodo-core      — management UI + API server (run once, on your main host)
#   komodo-ferretdb  — lightweight MongoDB-compatible DB (uses SQLite under the hood)
#   komodo-periphery — agent on each host you want Komodo to manage
#
# The periphery can be deployed separately on remote hosts using just the
# periphery service from this file. See README for details.

services:
  komodo-core:
    image: ghcr.io/moghtech/komodo-core:latest
    container_name: komodo-core
    restart: unless-stopped
    depends_on:
      komodo-ferretdb:
        condition: service_healthy
    ports:
      # Bind defaults to all interfaces; set KOMODO_BIND to a specific address
      # (e.g. a Tailscale IP) to keep the UI off the public internet.
      - "${KOMODO_BIND:-0.0.0.0}:${KOMODO_PORT:-9120}:9120"
    volumes:
      - komodo-core-repos:/etc/komodo/repos
      - komodo-core-stacks:/etc/komodo/stacks
    environment:
      # Database
      KOMODO_DATABASE_URI: "mongodb://komodo-ferretdb:27017/${KOMODO_DB_NAME:-komodo}"
      # Auth — change both of these before first run
      KOMODO_PASSKEY: "${KOMODO_PASSKEY}"
      KOMODO_JWT_SECRET: "${KOMODO_JWT_SECRET}"
      # Optional: your domain for correct URL generation in notifications
      KOMODO_HOST: "${KOMODO_HOST:-http://localhost:9120}"
      KOMODO_TITLE: "${KOMODO_TITLE:-Komodo}"
    networks:
      - komodo-internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  komodo-ferretdb:
    image: ghcr.io/ferretdb/ferretdb:latest
    container_name: komodo-ferretdb
    restart: unless-stopped
    volumes:
      - komodo-ferretdb-data:/state
    environment:
      FERRETDB_HANDLER: sqlite
    networks:
      - komodo-internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/debug/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  komodo-periphery:
    image: ghcr.io/moghtech/komodo-periphery:latest
    container_name: komodo-periphery
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc                          # for host system stats
      - komodo-periphery-stacks:/etc/komodo/stacks
    environment:
      # Must match KOMODO_PASSKEY on the core
      PERIPHERY_PASSKEY: "${KOMODO_PASSKEY}"
      PERIPHERY_PORT: "${PERIPHERY_PORT:-8120}"
    ports:
      - "${KOMODO_BIND:-0.0.0.0}:${PERIPHERY_PORT:-8120}:8120"
    networks:
      - komodo-internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  komodo-internal:
    name: komodo-internal

volumes:
  komodo-core-repos:
  komodo-core-stacks:
  komodo-ferretdb-data:
  komodo-periphery-stacks:
