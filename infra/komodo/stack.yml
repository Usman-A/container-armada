name: komodo

# Komodo — container & stack management across multiple hosts.
# https://komo.do  ·  mirrors the official compose/ferretdb.compose.yaml model.
#
# Components:
#   komodo-core      — management UI + API server
#   komodo-ferretdb  — MongoDB-compatible adapter in front of Postgres/DocumentDB
#   komodo-postgres  — DocumentDB-flavoured Postgres, FerretDB's storage backend
#   komodo-periphery — agent on this host; core connects to it over the internal
#                      network (no host ports). KOMODO_FIRST_SERVER auto-registers it.
#
# Auth model: core and periphery share the `komodo-keys` volume (/config/keys)
# for their keypair handshake, and both hold the same KOMODO_PASSKEY. Periphery
# listens only on the internal komodo network, reachable at komodo-periphery:8120.
#
# FerretDB v2 dropped the embedded SQLite backend; it now requires Postgres with
# the DocumentDB extension (ghcr.io/ferretdb/postgres-documentdb).
#
# First run: KOMODO_LOCAL_AUTH + KOMODO_INIT_ADMIN_* seed the admin account.
# After confirming login, registration is locked (KOMODO_DISABLE_USER_REGISTRATION).

services:
  komodo-core:
    image: ghcr.io/moghtech/komodo-core:latest
    container_name: komodo-core
    init: true
    restart: unless-stopped
    depends_on:
      komodo-ferretdb:
        condition: service_started
    ports:
      # Bind defaults to all interfaces; set KOMODO_BIND to a specific address
      # (e.g. a Tailscale IP) to keep the UI off the public internet.
      - "${KOMODO_BIND:-0.0.0.0}:${KOMODO_PORT:-9120}:9120"
    volumes:
      - komodo-keys:/config/keys           # shared with periphery for auth
      - komodo-core-backups:/backups
    environment:
      # Database (FerretDB speaks the MongoDB wire protocol)
      KOMODO_DATABASE_ADDRESS: "komodo-ferretdb:27017"
      KOMODO_DATABASE_USERNAME: "${KOMODO_DATABASE_USERNAME}"
      KOMODO_DATABASE_PASSWORD: "${KOMODO_DATABASE_PASSWORD}"
      # Identity / URLs
      KOMODO_HOST: "${KOMODO_HOST:-http://localhost:9120}"
      KOMODO_TITLE: "${KOMODO_TITLE:-Komodo}"
      # Secrets
      KOMODO_PASSKEY: "${KOMODO_PASSKEY}"
      KOMODO_JWT_SECRET: "${KOMODO_JWT_SECRET}"
      KOMODO_WEBHOOK_SECRET: "${KOMODO_WEBHOOK_SECRET}"
      # Auth — local login + seeded admin; registration locked after first run
      KOMODO_LOCAL_AUTH: "${KOMODO_LOCAL_AUTH:-true}"
      KOMODO_INIT_ADMIN_USERNAME: "${KOMODO_INIT_ADMIN_USERNAME}"
      KOMODO_INIT_ADMIN_PASSWORD: "${KOMODO_INIT_ADMIN_PASSWORD}"
      KOMODO_DISABLE_USER_REGISTRATION: "${KOMODO_DISABLE_USER_REGISTRATION:-true}"
      KOMODO_ENABLE_NEW_USERS: "${KOMODO_ENABLE_NEW_USERS:-false}"
      # Auto-register the local periphery as a managed server (address + name)
      KOMODO_FIRST_SERVER: "${KOMODO_FIRST_SERVER:-https://komodo-periphery:8120}"
      KOMODO_FIRST_SERVER_NAME: "${KOMODO_FIRST_SERVER_NAME:-Local}"
    networks:
      - komodo-internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  komodo-ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2
    container_name: komodo-ferretdb
    restart: unless-stopped
    depends_on:
      komodo-postgres:
        condition: service_healthy
    volumes:
      - komodo-ferretdb-state:/state
    environment:
      FERRETDB_POSTGRESQL_URL: "postgres://${KOMODO_DATABASE_USERNAME}:${KOMODO_DATABASE_PASSWORD}@komodo-postgres:5432/postgres"
    networks:
      - komodo-internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  komodo-postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:latest
    container_name: komodo-postgres
    restart: unless-stopped
    volumes:
      - komodo-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${KOMODO_DATABASE_USERNAME}"
      POSTGRES_PASSWORD: "${KOMODO_DATABASE_PASSWORD}"
      POSTGRES_DB: postgres
    networks:
      - komodo-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  komodo-periphery:
    image: ghcr.io/moghtech/komodo-periphery:latest
    container_name: komodo-periphery
    init: true
    restart: unless-stopped
    depends_on:
      - komodo-core
    volumes:
      - komodo-keys:/config/keys           # shared with core for auth
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc                        # for host system stats
      - /etc/komodo:/etc/komodo            # periphery root working directory
    environment:
      # Passive agent: listens on the internal network only (no host ports).
      # Core connects in at komodo-periphery:8120 using the shared passkey.
      PERIPHERY_PASSKEY: "${KOMODO_PASSKEY}"
      PERIPHERY_ROOT_DIRECTORY: /etc/komodo
    networks:
      - komodo-internal
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  komodo-internal:
    name: komodo-internal

volumes:
  komodo-keys:
  komodo-core-backups:
  komodo-ferretdb-state:
  komodo-postgres-data:
