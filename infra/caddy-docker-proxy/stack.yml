name: caddy-docker-proxy

# caddy-docker-proxy automatically configures Caddy as a reverse proxy
# by reading Docker labels on your other containers. No manual Caddyfile needed.
#
# Other containers opt in by:
#   1. Joining the shared caddy network (name = CADDY_INGRESS_NETWORK)
#   2. Adding labels:
#        caddy: app.yourdomain.com
#        caddy.reverse_proxy: "{{upstreams 8080}}"

services:
  caddy:
    # Custom build (see Dockerfile) that includes the Cloudflare DNS plugin
    # for ACME DNS-01. Falls back to ${CADDY_IMAGE} if you publish your own.
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CADDY_IMAGE:-caddy-docker-proxy-cloudflare:local}
    container_name: caddy-docker-proxy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Must match the network name other containers join to be proxied.
      CADDY_INGRESS_NETWORKS: "${CADDY_INGRESS_NETWORK:-caddy}"
      # Cloudflare API token (DNS:Edit on the relevant zones) for ACME DNS-01.
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:?cloudflare api token required for DNS-01}"
    # Global Caddy options via label-only entries (no site value) on this
    # container. Produces a global options block:
    #   { email ...; acme_dns cloudflare {env.CLOUDFLARE_API_TOKEN} }
    labels:
      caddy.email: "${ACME_EMAIL:?acme email required}"
      caddy.acme_dns: "cloudflare {env.CLOUDFLARE_API_TOKEN}"
    networks:
      - caddy
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  caddy:
    name: "${CADDY_INGRESS_NETWORK:-caddy}"

volumes:
  caddy_data:
  caddy_config:
